<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="shortcut icon" href="../../assets/img/favicon (1).ico" type="image/x-icon">

    <link rel="stylesheet" href="../styles/styles.ListaPresentes/style.ListaPresentes.css">
    <link rel="stylesheet" href="../styles/fontes.css">
    <link rel="stylesheet" href="../styles/animations/animations.css">
    <link rel="stylesheet" href="../styles/styles.ListaPresentes/style.listaPresentes.phone.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C&S - Lista de Presentes</title>
</head>
<body>
    <header id="cabecalho">
        <h1 id="tituloCabecalho">C&S</h1>

        <div id="secVes"><p id="versiculo">Até aqui nos ajudou o Senhor</p>
        <p id="versiculo1">1 Samuel 7:12</p></div>
        
    </header>
    <div id="linha"></div>
    <div id="secEscolha">
        <p id="subTitulo1">Escolha seu presentinho. . .</p>
        <p id="subTitulo2">Clique para adicionar ao carrinho</p>
    </div>

    <main id="containerItens">
        <div id="itemLivre" class="item">
            <div class="divImg"><img src="../../assets/img/imgItens/img1.jpeg" alt="Alianças"></div>
            <p>Caso prefira, presenteie com o valor que preferir</p>
            <input type="number" placeholder="R$" id="livre">
        </div>
        
        <button id="btnCarrinho"><img src="../../assets/img/carrinho.png" alt=""></button>
        <div id="itemAdd"></div>
    </main>

    <script type="module" src="../script/script.listaItens.js"></script>
</body>
</html>
